    <style>
      *{box-sizing:border-box;margin:0;padding:0}
      html,body{width:100%;height:100%}
      body{background:#1c1820;color:#f5f0e8;font-family:Georgia,serif}
      /* Splash is fixed so it overlays #root — zero layout shift on removal */
      #splash{position:fixed;inset:0;display:flex;z-index:9999;background:#1c1820}
      .sp{flex:1;position:relative;overflow:hidden}
      .sp img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(0.5)}
      .sp-label{position:absolute;bottom:60px;left:0;right:0;text-align:center;font-size:26px;letter-spacing:0.3em;text-transform:uppercase;color:#f5f0e8;font-family:Georgia,serif}
      #root{min-height:100%}
      @media(max-width:767px){
        #splash{flex-direction:column}
        .sp-label{font-size:20px;bottom:28px}
      }
    </style>
